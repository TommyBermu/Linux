menuentry 'Windows Boot Manager (on /dev/nvme0n1p1)' --class windows --class os $menuentry_id_option 'osprober-efi-D091-01DC' {
	insmod part_gpt
	insmod fat
	search --no-floppy --fs-uuid --set=root D091-01DC
