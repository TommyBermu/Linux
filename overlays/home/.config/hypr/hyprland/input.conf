input {
    kb_layout = us,es
    kb_variant = intl,
    kb_options = grp:win_space_toggle
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35

    focus_on_close = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = $touchpadDisableTyping
        scroll_factor = $touchpadScrollFactor
    }
    sensitivity = 0.4
    accel_profile = flat
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
}

